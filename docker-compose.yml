services:
  identity-mysql:
    image: mysql:8.4
    container_name: nexus-identity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: nexus_identity_db
    ports:
      - "3307:3306"
    volumes:
      - identity-mysql-data:/var/lib/mysql

  work-mysql:
    image: mysql:8.4
    container_name: nexus-work-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: nexus_work_db
    ports:
      - "3308:3306"
    volumes:
      - work-mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  kafka:
    image: bitnami/kafka:3.9
    container_name: nexus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Kafka chay KRaft single-node, khong can Zookeeper cho moi truong dev local.
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka-data:/bitnami/kafka

volumes:
  identity-mysql-data:
  work-mysql-data:
  redis-data:
  kafka-data:
