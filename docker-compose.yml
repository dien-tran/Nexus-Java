services:
  identity-mysql:
    image: mysql:8.4
    container_name: nexus-identity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: nexus_identity_db
    ports:
      - "3307:3306"
    volumes:
      - identity-mysql-data:/var/lib/mysql

  work-mysql:
    image: mysql:8.4
    container_name: nexus-work-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: nexus_work_db
    ports:
      - "3308:3306"
    volumes:
      - work-mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:latest
    container_name: nexus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Kafka chay KRaft single-node theo chuan Apache image
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data

  chat-service:
    build:
      context: ./chat-service
    container_name: nexus-chat-service
    restart: unless-stopped
    env_file:
      - ./chat-service/.env
    environment:
      CHAT_SERVICE_PORT: 8090
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-44b63ac98e12ce6ca2979e22a56fff7a7a7fea0b4c174965105f52f9d0c278ff}
      WORK_SERVICE_BASE_URL: ${WORK_SERVICE_BASE_URL:-http://work-service:8082}
      WORK_SERVICE_TIMEOUT_SECONDS: 5
    ports:
      - "8090:8090"
    depends_on:
      - work-service

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        MODULE: discovery-server
    container_name: nexus-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        MODULE: identity-service
    container_name: nexus-identity-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://identity-mysql:3306/nexus_identity_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server
      - identity-mysql
      - kafka

  work-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        MODULE: work-service
    container_name: nexus-work-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://work-mysql:3306/nexus_work_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server
      - work-mysql
      - redis
      - kafka

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        MODULE: api-gateway
    container_name: nexus-api-gateway
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      CHAT_SERVICE_URI: http://chat-service:8090
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - identity-service
      - work-service
      - chat-service

  front-end:
    build:
      context: ./front-end
    container_name: nexus-front-end
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5137
      API_GATEWAY_URL: http://api-gateway:8080
    ports:
      - "5137:5137"
    depends_on:
      - api-gateway

volumes:
  identity-mysql-data:
  work-mysql-data:
  redis-data:
  kafka-data:
